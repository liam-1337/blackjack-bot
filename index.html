<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Three.js App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/deck.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>

    <div id="ui-container">
        <div id="player-info" class="info-panel">
            <h2>Player</h2>
            <p>Hand: <span id="player-cards"></span></p>
            <p>Value: <span id="player-value"></span></p>
        </div>
        <div id="dealer-info" class="info-panel">
            <h2>Dealer</h2>
            <p>Hand: <span id="dealer-cards"></span></p>
            <p>Value: <span id="dealer-value"></span></p>
        </div>
        <div id="bet-info" class="info-panel">
            <p>Current Bet: <span id="bet-amount"></span></p>
        </div>
        <div id="message-area" class="info-panel">
            <p><span id="game-message">Welcome to 3D Blackjack!</span></p>
        </div>
        <div id="action-buttons">
            <button id="hit-button">Hit</button>
            <button id="stand-button">Stand</button>
            <button id="double-button">Double Down</button>
            <button id="split-button">Split</button>
            <button id="new-game-button" style="display:none;">New Game</button>
        </div>
    </div>

    <div id="insurance-prompt" style="display: none;">
        <p>Dealer shows an Ace. Take Insurance?</p>
        <button id="take-insurance-button">Take Insurance (cost: <span id="insurance-cost-text">X</span>)</button>
        <button id="decline-insurance-button">Decline</button>
    </div>
    <div id="insurance-bet-info" class="info-panel" style="display: none; position: absolute; top: 10px; right: 10px;">
        Insurance Bet: <span id="insurance-bet-amount">0</span>
    </div>
</body>
</html>
